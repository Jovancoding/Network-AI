version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
    ignore:
      # Only auto-update patch versions for dev dependencies; minor/major need review
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      # github/codeql-action ships init/autobuild/analyze/upload-sarif as
      # separate action paths within one repo/release. They MUST stay on the
      # same version — the CodeQL CLI hard-fails if init's config-file
      # version doesn't match the version autobuild/analyze run with. Group
      # them so Dependabot always proposes (and merges) them atomically.
      codeql-action:
        patterns:
          - "github/codeql-action*"
